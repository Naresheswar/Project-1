<!DOCTYPE html>
<html>
<head>
    <title>Online Examination Registration</title>
    <script src="script4.js" defer></script>
    <style>
        body {
            font-family: Arial;
        }
        form {
            width: 400px;
            margin: auto;
            padding: 20px;
        }
        .error {
            color: red;
            font-size: 14px;
        }
        button {
            padding: 8px 15px;
            width: 100%;
        }
    </style>
</head>
<body>

<form id="examForm">
    <h2 align="center">Exam Registration</h2>

    <input type="text" id="name" placeholder="Student Name">
    <div id="nameError" class="error"></div>

    <input type="email" id="email" placeholder="Email">
    <div id="emailError" class="error"></div>

    <p>Gender:</p>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <div id="genderError" class="error"></div>

    <p>Subjects Interested:</p>
    <input type="checkbox" name="subject" value="Math"> Math
    <input type="checkbox" name="subject" value="Physics"> Physics
    <input type="checkbox" name="subject" value="Chemistry"> Chemistry
    <input type="checkbox" name="subject" value="Biology"> Biology
    <div id="subjectError" class="error"></div>

    <br>
    <input type="checkbox" id="declaration"> I hereby declare that the information provided is true.
    <div id="declarationError" class="error"></div>

    <br><br>
    <button type="submit">Register</button>
</form>

</body>
</html>
