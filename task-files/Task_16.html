<html>
<head>
<title> Product Catalog</title>
<style>
table{
width:80%;
margin:20px auto;
background-color:white;
}
th, td{
border:1px solid black;
text-align:center;
}
th{
background-color:grey;
}
tr:nth-child(even){
background-color:lightgrey;
}
tr:hover{
background-color:cyan;
}
img{
width:50px;
height:50px;
}
</style>
</head>
<body>
<h2 align="center">Product Catalog</h2>
<table>
<tr>
<th>Image</th>
<th>Product Name</th>
<th>Price</th>
<th>Description</th>
</tr>
<tr>
<td><img src="product-1.svg" alt="Product 1"></td>
<td>Product 1</td>
<td>$15</td>
<td>very good</td>
</tr>
<tr>
<td><img src="product-2.svg" alt="Product 2"></td>
<td>Product 2</td>
<td>$20</td>
<td>even better</td>
</tr>
<tr>
<td><img src="product-3.svg" alt="Product 3"></td>
<td>Product 3</td>
<td>$25</td>
<td>best</td>
</tr>
<tr>
<td><img src="product-4.svg" alt="Product 4"></td>
<td>Product 4</td>
<td>$25</td>
<td>Best of all</td>
</tr>
</table>
</body>
</html>
