<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: lightblue;
        }

        form {
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 15px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4e73df;
            box-shadow: 0 0 8px rgba(78, 115, 223, 0.5);
        }

        button {
            padding: 10px;
            border-radius: 5px;
            background: darkblue;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
        }
    </style>
</head>
<body>

    <form>
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button type="submit">Login</button>
    </form>

    <script>
        const username = document.getElementById("username");
        const password = document.getElementById("password");

        username.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && username.value.trim() !== "") {
                e.preventDefault();
                password.focus();
            }
        });

        username.addEventListener("blur", function () {
            if (username.value.trim() !== "") {
                password.focus();
            }
        });
    </script>

</body>
</html>
