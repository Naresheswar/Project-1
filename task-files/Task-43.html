<!DOCTYPE html>
<html>
<head>
    <title>Image with Caption Overlay</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            position: relative;
            width: 400px;
            margin: 20px auto;
        }

        .container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: black;
            opacity: 0.6;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRETmhB1cTR399RIrnNsAIBqxAPsdMsJddTIg&s" alt="Thala Dhoni">
        <div class="caption">Thala Dhoni</div>
    </div>

</body>
</html>
